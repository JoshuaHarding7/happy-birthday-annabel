<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Annabel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Caveat:wght@500;600&family=Karla:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbfaf7;
    --white:#ffffff;
    --ink:#20242e;
    --ink-soft:#8a8f99;
    --teal:#00a7c4;
    --green:#6abf2e;
    --yellow:#ffd400;
    --orange:#ff8a00;
    --red:#d0021b;
    --cw:min(380px,86vw);
    --ch:min(560px,76vh);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Karla',sans-serif;
    overflow-x:hidden;
    min-height:100vh;
  }

  /* ---------- envelope screen ---------- */
  #envelopeScreen{
    position:fixed;inset:0;z-index:50;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2.2rem;text-align:center;padding:1.5rem;
    background:var(--bg);
    transition:opacity .9s ease, visibility .9s;
  }
  #envelopeScreen.gone{opacity:0;visibility:hidden}
  .from-line{font-size:.85rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft)}
  .envelope{cursor:pointer;position:relative;width:min(320px,80vw);filter:drop-shadow(0 14px 30px rgba(32,36,46,.18));transition:transform .3s ease}
  .envelope:hover{transform:translateY(-6px)}
  .envelope:focus-visible{outline:3px solid var(--teal);outline-offset:8px;border-radius:12px}
  .env-body{width:100%;aspect-ratio:16/10;background:linear-gradient(160deg,#fdfdfd,#eeeeec);border:1px solid rgba(32,36,46,.1);border-radius:10px;position:relative;overflow:hidden}
  .env-body::before{content:"";position:absolute;inset:0;background:linear-gradient(200deg, rgba(32,36,46,.06) 0%, transparent 45%)}
  .env-flap{
    position:absolute;top:0;left:0;width:100%;height:58%;
    background:linear-gradient(180deg,#ffffff,#f0f0ee);
    border-bottom:1px solid rgba(32,36,46,.08);
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top center;border-radius:10px 10px 0 0;
    transition:transform 1s cubic-bezier(.6,-0.2,.3,1.2);
    z-index:3;
  }
  .env-seal{
    position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);
    width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ef5164, var(--red));
    display:flex;align-items:center;justify-content:center;font-size:1.5rem;
    z-index:4;transition:opacity .4s;box-shadow:0 4px 12px rgba(32,36,46,.28);
  }
  .env-card{
    position:absolute;left:6%;bottom:8%;width:88%;height:70%;
    background:var(--white);border:1px solid rgba(32,36,46,.1);border-radius:6px;z-index:2;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink);font-family:'Caveat',cursive;font-size:1.5rem;
    transition:transform 1s ease .35s;
  }
  .envelope.open .env-flap{transform:rotateX(180deg) scaleY(-.15);opacity:.9}
  .envelope.open .env-seal{opacity:0}
  .envelope.open .env-card{transform:translateY(-46%)}
  .tap-hint{font-size:1rem;color:var(--ink-soft);animation:bob 2.2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

  /* ---------- card stage ---------- */
  main{position:relative;z-index:1;opacity:0;transition:opacity 1.2s ease .4s}
  main.shown{opacity:1}
  .stage{
    min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1.6rem;padding:1.4rem;overflow:hidden;
  }
  .book-scale{transition:transform 1.2s ease}
  .book{
    position:relative;width:var(--cw);height:var(--ch);
    perspective:2200px;
    transition:transform 1.2s ease;
  }
  .book.open{transform:translateX(calc(var(--cw) / 2))}

  .face{
    position:absolute;inset:0;
    background:var(--white);
    border:1px solid rgba(32,36,46,.12);
    box-shadow:0 24px 60px rgba(32,36,46,.16);
    border-radius:4px 14px 14px 4px;
    padding:2.2rem 1.9rem;
  }

  /* inside right page (the message) */
  .inside-right{
    left:0;right:auto;width:var(--cw);height:var(--ch);
    display:flex;flex-direction:column;text-align:left;
    overflow:hidden;
    border-radius:4px 14px 14px 4px;
    z-index:1;
  }
  .to-line{font-family:'Caveat',cursive;font-size:1.65rem;margin-bottom:.7rem;color:var(--ink)}
  .inside-right p{font-family:'Caveat',cursive;font-size:1.18rem;line-height:1.45;flex:1;color:var(--ink)}
  .sig{text-align:right;font-family:'Caveat',cursive;font-size:1.45rem;margin-top:.8rem;opacity:0;transition:opacity .8s}
  .sig.shown{opacity:1}
  .caret{display:inline-block;width:2px;height:1.05em;background:var(--ink);vertical-align:-0.12em;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  /* the cover: front design on one side, blank inside-left on the back */
  .cover{
    position:absolute;inset:0;
    transform-origin:left center;
    transform-style:preserve-3d;
    transition:transform 1.4s cubic-bezier(.65,0,.3,1);
    cursor:pointer;z-index:2;
  }
  .book.open .cover{transform:rotateY(-180deg)}
  .cover-front,.cover-back{
    position:absolute;inset:0;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--white);
    border:1px solid rgba(32,36,46,.12);
    border-radius:4px 14px 14px 4px;
    box-shadow:0 24px 60px rgba(32,36,46,.16);
  }
  .cover-front{
    display:flex;flex-direction:column;align-items:center;text-align:center;
    padding:2.2rem 1.9rem;
  }
  .cover-back{
    transform:rotateY(180deg);
    border-radius:14px 4px 4px 14px;
    box-shadow:0 24px 60px rgba(32,36,46,.10);
    display:flex;align-items:center;justify-content:center;
    padding:2.2rem 1.9rem;
  }
  .back-art{width:100%;height:100%;display:flex;align-items:center;justify-content:center;min-height:0}
  .sketch-mount{
    background:#f4f4f2;padding:.55rem .55rem .9rem;border-radius:4px;
    box-shadow:0 8px 22px rgba(32,36,46,.14);transform:rotate(-1.5deg);
    max-height:100%;display:flex;
  }
  .sketch-mount img{max-height:100%;max-width:min(300px,64vw);object-fit:contain;display:block;border-radius:2px}

  .front-eyebrow{font-size:.72rem;letter-spacing:.28em;color:var(--orange);text-transform:uppercase;margin-bottom:1rem}
  .front-title{
    font-family:'Instrument Serif',serif;font-weight:400;
    font-size:clamp(1.9rem,6.5vw,2.5rem);line-height:1.1;color:var(--ink);
  }
  .front-num{font-style:italic;font-size:1.3em;color:var(--teal)}
  .front-photo{
    margin-top:1.4rem;flex:1;min-height:0;width:100%;
    display:flex;align-items:center;justify-content:center;
  }
  .front-photo .mount{
    background:#f4f4f2;padding:.55rem .55rem .9rem;border-radius:4px;
    box-shadow:0 8px 22px rgba(32,36,46,.14);transform:rotate(1.5deg);
    max-height:100%;display:flex;
  }
  .front-photo img{max-height:100%;max-width:min(300px,64vw);object-fit:contain;display:block;border-radius:2px}

  .open-hint{
    font-size:.9rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);
    display:flex;align-items:center;gap:.6rem;transition:opacity .5s;
  }
  .hint-arrow{
    font-size:.95rem;font-weight:400;display:inline-block;color:var(--ink-soft);
    animation:bob 1.8s ease-in-out infinite;
  }
  .open-hint.gone{opacity:0}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition-duration:.01s !important}
  }
</style>
</head>
<body>

<!-- opening screen -->
<div id="envelopeScreen">
  <div class="from-line">A card for you</div>
  <div class="envelope" id="envelope" role="button" tabindex="0" aria-label="Open the envelope">
    <div class="env-flap"></div>
    <div class="env-seal">&#128140;</div>
    <div class="env-card">for Annabel</div>
    <div class="env-body"></div>
  </div>
  <div class="tap-hint">tap to open</div>
</div>

<main id="card">
  <div class="stage" id="stage">

<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.3/confetti.browser.min.js"></script>
<script>
  const PALETTE = ['#00a7c4','#6abf2e','#ffd400','#ff8a00','#d0021b'];
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- envelope ----
  const env=document.getElementById('envelope');
  const screen=document.getElementById('envelopeScreen');
  const main=document.getElementById('card');
  let envOpened=false;
  function openEnvelope(){
    if(envOpened)return;envOpened=true;
    env.classList.add('open');
    setTimeout(()=>{
      screen.classList.add('gone');
      main.classList.add('shown');
      if(!reduced && window.confetti){
        confetti({particleCount:130,spread:85,origin:{y:.6},colors:PALETTE});
      }
    },1100);
  }
  env.addEventListener('click',openEnvelope);
  env.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')openEnvelope()});

  // ---- open the card (swipe or tap) ----
  const book=document.getElementById('book');
  const cover=document.getElementById('cover');
  const hint=document.getElementById('openHint');
  const scale=document.getElementById('bookScale');
  let cardOpened=false;

  function fitSpread(){
    // when open, the spread is two pages wide - scale down if needed
    const cw = book.getBoundingClientRect().width;
    const s = Math.min(1, (window.innerWidth * 0.94) / (cw * 2));
    scale.style.transform = cardOpened ? `scale(${s})` : 'scale(1)';
  }
  window.addEventListener('resize',fitSpread);

  function openCard(){
    if(cardOpened)return;cardOpened=true;
    book.classList.add('open');
    hint.classList.add('gone');
    fitSpread();
    setTimeout(typeIt, reduced ? 0 : 900);
    if(!reduced && window.confetti){
      setTimeout(()=>confetti({particleCount:90,spread:70,startVelocity:32,origin:{y:.55},colors:PALETTE}),700);
    }
  }
  cover.addEventListener('click',openCard);
  cover.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')openCard()});

  // ---- typewriter ----
  const MESSAGE = "I hope you're having the most amazing time in America \u2014 from everything I've seen, it certainly looks like it, and I love that for you. I wish I could be there to celebrate with you properly, but this will have to do for now. Have the most incredible 20th birthday \u2014 you deserve every second of it. Miss you loads.";
  const typed=document.getElementById('typedMsg');
  const sig=document.getElementById('sig');
  let typing=false;
  function typeIt(){
    if(typing)return;typing=true;
    if(reduced){typed.textContent=MESSAGE;sig.classList.add('shown');return;}
    let i=0;
    const caret=document.createElement('span');caret.className='caret';
    (function tick(){
      typed.textContent=MESSAGE.slice(0,i);
      typed.appendChild(caret);
      if(i++<MESSAGE.length){setTimeout(tick, 24);}
      else{caret.remove();sig.classList.add('shown');}
    })();
  }
</script>
